<!DOCTYPE html>
<html>
<head>
<style>
body { background: #fff; margin: 20px; font-family: 'Courier New', monospace; }
svg { border: 1px solid #ddd; }
</style>
</head>
<body>
<!--
  EDITABLE DIAGRAM: Two cones with step-out angle
  
  To edit: open this file in any text editor.
  All coordinates are in the SVG below.
  The origin is at (400, 400) in screen coordinates.
  
  KEY ELEMENTS:
  - Cone 1 (upper): AB pair, Thug 1 at 45° above horizontal
  - Cone 2 (lower): CD pair, Thug 2 rolled down on Cone 1 mantle
  - Step-out angle: 30° from horizontal
  - Horizontal plane at y=400
  - All angles measured from the horizontal line
-->

<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <!-- GRID (faint, for editing reference) -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="0" y1="400" x2="800" y2="400"/>  <!-- horizontal center -->
    <line x1="400" y1="0" x2="400" y2="800"/>  <!-- vertical center -->
    <!-- 45° diagonals through origin -->
    <line x1="100" y1="700" x2="700" y2="100" stroke="#f0f0f0"/>
    <line x1="100" y1="100" x2="700" y2="700" stroke="#f0f0f0"/>
  </g>

  <!-- ORIGIN -->
  <circle cx="400" cy="400" r="5" fill="#333"/>
  <text x="408" y="418" font-size="11" fill="#666">O</text>

  <!-- HORIZONTAL PLANE (the mirror plane) -->
  <line x1="80" y1="400" x2="720" y2="400" stroke="#888" stroke-width="1.5"/>
  <text x="725" y="404" font-size="11" fill="#888">horizontal</text>

  <!-- VERTICAL AXIS -->
  <line x1="400" y1="80" x2="400" y2="720" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="404" y="75" font-size="11" fill="#bbb">Z (vertical)</text>

  <!-- ============================================ -->
  <!-- THUG 1 AXIS: 45° above horizontal, to the right -->
  <!-- From origin (400,400) going up-right at 45° -->
  <!-- Direction: (cos45°, sin45°) = (0.707, -0.707) in screen coords (y flipped) -->
  <!-- Length ~250px -->
  <!-- ============================================ -->
  <line x1="400" y1="400" x2="577" y2="223" 
        stroke="#06a060" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="585" y="218" font-size="13" fill="#06a060" font-weight="bold">Thug 1</text>
  <text x="585" y="234" font-size="11" fill="#06a060">axis (45°)</text>

  <!-- 45° angle arc for Thug 1 -->
  <path d="M 460,400 A 60,60 0 0,0 442,358" fill="none" stroke="#06a060" stroke-width="1"/>
  <text x="462" y="375" font-size="12" fill="#06a060">45°</text>

  <!-- ============================================ -->
  <!-- CONE 1 MANTLE (upper cone) -->
  <!-- Two lines from origin at 45° spread around Thug 1 -->
  <!-- Thug 1 is at 45° from horizontal -->
  <!-- Cone half-angle is 45° around Thug 1 -->
  <!-- So mantle goes from 0° (horizontal) to 90° (vertical) -->
  <!-- ============================================ -->
  
  <!-- Mantle line 1: along horizontal (0° from horiz = 45° from Thug 1) -->
  <line x1="400" y1="400" x2="620" y2="400" 
        stroke="#06a060" stroke-width="1" stroke-dasharray="6 3" opacity="0.5"/>
  
  <!-- Mantle line 2: along vertical (90° from horiz = 45° from Thug 1) -->
  <line x1="400" y1="400" x2="400" y2="180" 
        stroke="#06a060" stroke-width="1" stroke-dasharray="6 3" opacity="0.5"/>

  <!-- Cone surface (hatched triangle suggesting the mantle) -->
  <path d="M 400,400 L 580,220 L 620,400 Z" fill="none" stroke="#06a060" stroke-width="0.5" opacity="0.3"/>
  <path d="M 400,400 L 580,220 L 400,180 Z" fill="none" stroke="#06a060" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Hatching on the mantle (a few lines to suggest surface) -->
  <g stroke="#06a060" stroke-width="0.3" opacity="0.25">
    <line x1="440" y1="360" x2="530" y2="360"/>
    <line x1="450" y1="340" x2="545" y2="340"/>
    <line x1="460" y1="320" x2="555" y2="320"/>
    <line x1="470" y1="300" x2="560" y2="300"/>
    <line x1="480" y1="280" x2="565" y2="280"/>
    <line x1="490" y1="260" x2="568" y2="260"/>
    <line x1="500" y1="240" x2="570" y2="240"/>
  </g>

  <!-- ============================================ -->
  <!-- DUDE A: in the Thug 1 plane, one arm of the AB pair -->
  <!-- Perpendicular to Thug 1, in the plane of the drawing -->
  <!-- Direction: perpendicular to (1/√2, 1/√2) = (-1/√2, 1/√2) -->
  <!-- Screen coords: from origin going down-right at 45° below Thug 1 -->
  <!-- ============================================ -->
  <line x1="400" y1="400" x2="530" y2="530" 
        stroke="#d4a020" stroke-width="2"/>
  <text x="535" y="540" font-size="12" fill="#d4a020" font-weight="bold">A</text>

  <!-- DUDE B: perpendicular to A, coming out of the page plane -->
  <!-- Shown as a short line with a circle (into-page symbol) -->
  <line x1="400" y1="400" x2="400" y2="440" stroke="#cc8800" stroke-width="2"/>
  <circle cx="400" cy="450" r="6" fill="none" stroke="#cc8800" stroke-width="1.5"/>
  <circle cx="400" cy="450" r="1.5" fill="#cc8800"/>
  <text x="412" y="455" font-size="11" fill="#cc8800">B (⊥ page)</text>

  <!-- ============================================ -->
  <!-- THUG 2 AXIS: rolled down on Cone 1 mantle -->
  <!-- Must be at 45° from Thug 1 (on the mantle) -->
  <!-- Steps out 30° from horizontal -->
  <!-- Direction from horizontal: 30° downward (into lower hemisphere) -->
  <!-- ============================================ -->
  
  <!-- Thug 2 going down-left at 30° below horizontal -->
  <!-- cos(30°)=0.866 horizontal, sin(30°)=0.5 vertical -->
  <!-- Screen: going left and down from origin -->
  <line x1="400" y1="400" x2="183" y2="512" 
        stroke="#9040d0" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="130" y="520" font-size="13" fill="#9040d0" font-weight="bold">Thug 2</text>
  <text x="130" y="536" font-size="11" fill="#9040d0">axis (stepped out)</text>

  <!-- 30° step-out angle arc from horizontal -->
  <path d="M 340,400 A 60,60 0 0,1 345,430" fill="none" stroke="#9040d0" stroke-width="1"/>
  <text x="310" y="425" font-size="12" fill="#9040d0">30°</text>

  <!-- 45° angle between Thug 1 and Thug 2 -->
  <!-- Arc from Thug 1 direction to Thug 2 direction -->
  <path d="M 442,358 A 60,60 0 0,0 345,430" fill="none" stroke="#e04040" stroke-width="1.2"/>
  <text x="355" y="360" font-size="12" fill="#e04040" font-weight="bold">45°</text>
  <text x="345" y="375" font-size="10" fill="#e04040">(null cone)</text>

  <!-- ============================================ -->
  <!-- DUDE C: in the Thug 2 plane -->
  <!-- Perpendicular to Thug 2 -->
  <!-- ============================================ -->
  <line x1="400" y1="400" x2="290" y2="290" 
        stroke="#0080c0" stroke-width="2"/>
  <text x="275" y="285" font-size="12" fill="#0080c0" font-weight="bold">C</text>

  <!-- DUDE D: perpendicular to C in the CD plane -->
  <line x1="400" y1="400" x2="370" y2="440" stroke="#005888" stroke-width="2"/>
  <circle cx="362" cy="448" r="6" fill="none" stroke="#005888" stroke-width="1.5"/>
  <circle cx="362" cy="448" r="1.5" fill="#005888"/>
  <text x="340" y="465" font-size="11" fill="#005888">D (⊥ page)</text>

  <!-- ============================================ -->
  <!-- ANGLE ANNOTATIONS -->
  <!-- ============================================ -->
  
  <!-- The 45° + 30° = 75° total from vertical (or 15° from horizontal on the Thug1 side) -->
  
  <!-- Label: Thug 1 at 45° above horizontal -->
  <text x="600" y="160" font-size="11" fill="#333">
    Thug 1: 45° above horizontal
  </text>
  <text x="600" y="176" font-size="11" fill="#333">
    = null cone condition
  </text>

  <!-- Label: Thug 2 at 30° below horizontal -->
  <text x="80" y="580" font-size="11" fill="#333">
    Thug 2: 30° below horizontal
  </text>
  <text x="80" y="596" font-size="11" fill="#333">
    = step-out from rolling constraint
  </text>
  <text x="80" y="612" font-size="11" fill="#333">
    sin(30°) = 1/2, sin²(30°) = 1/4
  </text>

  <!-- Label: 45° between Thug 1 and Thug 2 -->
  <text x="80" y="650" font-size="11" fill="#e04040">
    Thug 1 · Thug 2 = cos(45°) = 1/√2
  </text>
  <text x="80" y="666" font-size="11" fill="#e04040">
    Thug 2 ON the mantle of Cone 1
  </text>

  <!-- Label: the key result -->
  <text x="80" y="720" font-size="13" fill="#333" font-weight="bold">
    45° + 30° = 75° total angle from vertical
  </text>
  <text x="80" y="740" font-size="13" fill="#333" font-weight="bold">
    Step-out = 30° = arcsin(1/2)
  </text>
  <text x="80" y="760" font-size="11" fill="#666">
    Compare: Weinberg angle θ_W ≈ 28.73°, sin²θ_W = 0.231
  </text>
  <text x="80" y="776" font-size="11" fill="#666">
    Geometric value: 30°, sin²(30°) = 0.250
  </text>

  <!-- ============================================ -->
  <!-- ARROW MARKERS -->
  <!-- ============================================ -->
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" 
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#06a060" stroke-width="1.5"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" 
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#9040d0" stroke-width="1.5"/>
    </marker>
  </defs>

</svg>

<p style="color:#888; font-size:11px; margin-top:10px;">
  Edit this file in any text editor to adjust positions, angles, and labels.
  Origin is at (400, 400). Screen Y is flipped (down = positive).
  All coordinates are directly in the SVG elements above.
</p>

</body>
</html>
